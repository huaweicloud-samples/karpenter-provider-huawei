name: Releases

on:
  push:
    tags:
    - v*

permissions:
  contents: write
  packages: write

jobs:
  releases:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
    - name: Clone the code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Set release info
      run: |
        echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
        echo "IMAGE_REPO=$(echo "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '~1.22'
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log into registry ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      env:
        RELEASE_IMAGE_NAME: ${{ vars.RELEASE_IMAGE_NAME }}
      run: |
        make_args=(IMAGE_REPO="$IMAGE_REPO" RELEASE_TAG="$RELEASE_TAG")
        if [ -n "$RELEASE_IMAGE_NAME" ]; then
          make_args+=(IMAGE_NAME="$(echo "$RELEASE_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')")
        fi
        echo "Release tag is: $RELEASE_TAG"
        echo "Release image is: $(make print-image "${make_args[@]}")"
        make docker-buildx "${make_args[@]}"
    - name: Run release
      run: |
        echo "Release tag is: $RELEASE_TAG"
        make release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
