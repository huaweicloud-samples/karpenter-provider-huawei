# This rule is not used by the project karpenter-provider-huawei itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to karpenter.k8s.huawei resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: karpenter-provider-huawei
    app.kubernetes.io/managed-by: kustomize
  name: ccenodeclass-viewer-role
rules:
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses/status
  verbs:
  - get
