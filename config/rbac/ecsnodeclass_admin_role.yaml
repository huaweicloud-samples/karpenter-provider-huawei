# This rule is not used by the project karpenter-provider-huawei itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over karpenter.k8s.huawei.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: karpenter-provider-huawei
    app.kubernetes.io/managed-by: kustomize
  name: ecsnodeclass-admin-role
rules:
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ecsnodeclasses
  verbs:
  - '*'
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ecsnodeclasses/status
  verbs:
  - get
