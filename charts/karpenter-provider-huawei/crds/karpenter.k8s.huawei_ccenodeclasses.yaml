---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: ccenodeclasses.karpenter.k8s.huawei
spec:
  group: karpenter.k8s.huawei
  names:
    kind: CCENodeClass
    listKind: CCENodeClassList
    plural: ccenodeclasses
    singular: ccenodeclass
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CCENodeClass is the Schema for the ccenodeclasses API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CCENodeClass
            properties:
              blockDeviceMappings:
                description: BlockDeviceMappings defines the root, k8s, and user data
                  volumes used for CCE CreateNode.
                properties:
                  k8s:
                    description: K8S is the data volume used by the container runtime
                      and kubelet.
                    properties:
                      iops:
                        description: IOPS is required for GPSSD2 and ESSD2.
                        format: int32
                        type: integer
                      throughput:
                        description: Throughput is required for GPSSD2.
                        format: int32
                        type: integer
                      volumeSize:
                        description: VolumeSize is the disk size in GiB.
                        format: int32
                        minimum: 10
                        type: integer
                      volumeType:
                        description: VolumeType is the disk type.
                        minLength: 1
                        type: string
                    required:
                    - volumeSize
                    - volumeType
                    type: object
                  root:
                    description: Root is the system disk.
                    properties:
                      iops:
                        description: IOPS is required for GPSSD2 and ESSD2.
                        format: int32
                        type: integer
                      throughput:
                        description: Throughput is required for GPSSD2.
                        format: int32
                        type: integer
                      volumeSize:
                        description: VolumeSize is the disk size in GiB.
                        format: int32
                        minimum: 10
                        type: integer
                      volumeType:
                        description: VolumeType is the disk type.
                        minLength: 1
                        type: string
                    required:
                    - volumeSize
                    - volumeType
                    type: object
                  users:
                    description: Users are additional user data disks.
                    items:
                      description: BlockDevice defines a CCE volume.
                      properties:
                        iops:
                          description: IOPS is required for GPSSD2 and ESSD2.
                          format: int32
                          type: integer
                        throughput:
                          description: Throughput is required for GPSSD2.
                          format: int32
                          type: integer
                        volumeSize:
                          description: VolumeSize is the disk size in GiB.
                          format: int32
                          minimum: 10
                          type: integer
                        volumeType:
                          description: VolumeType is the disk type.
                          minLength: 1
                          type: string
                      required:
                      - volumeSize
                      - volumeType
                      type: object
                    type: array
                required:
                - root
                type: object
                x-kubernetes-validations:
                - message: blockDeviceMappings.root.volumeSize must be at least 40Gi
                  rule: self.root.volumeSize >= 40
                - message: blockDeviceMappings.k8s.volumeSize must be at least 100Gi
                    when specified
                  rule: '!has(self.k8s) || self.k8s.volumeSize >= 100'
                - message: blockDeviceMappings.users volumeSize must be at least 100Gi
                  rule: '!has(self.users) || self.users.all(x, x.volumeSize >= 100)'
              ecsGroupId:
                description: ECSGroupID is the ECS server group ID used when creating
                  CCE nodes.
                type: string
              imsSelector:
                description: IMSSelector selects the node operating system family.
                properties:
                  imsFamily:
                    description: IMSFamily is the node operating system family.
                    minLength: 1
                    type: string
                required:
                - imsFamily
                type: object
              kubelet:
                description: Kubelet defines the kubelet settings that can be translated
                  into CCE CreateNode extendParam fields.
                properties:
                  kubeReserved:
                    additionalProperties:
                      type: string
                    description: |-
                      KubeReserved contains resources reserved for Kubernetes system components.
                      Supported keys map to CCE CreateNode kubeReserved* extendParam fields.
                    type: object
                    x-kubernetes-validations:
                    - message: valid keys for kubeReserved are ['cpu','memory','ephemeral-storage','pid']
                      rule: self.all(x, x=='cpu' || x=='memory' || x=='ephemeral-storage'
                        || x=='pid')
                    - message: kubeReserved value cannot be a negative resource quantity
                      rule: self.all(x, !self[x].startsWith('-'))
                  maxPods:
                    description: |-
                      MaxPods is an override for the maximum number of pods that can run on
                      a worker node instance. This maps to CCE CreateNode extendParam.maxPods.
                    format: int32
                    maximum: 256
                    minimum: 16
                    type: integer
                  systemReserved:
                    additionalProperties:
                      type: string
                    description: |-
                      SystemReserved contains resources reserved for OS system daemons and kernel memory.
                      Supported keys map to CCE CreateNode systemReserved* extendParam fields.
                    type: object
                    x-kubernetes-validations:
                    - message: valid keys for systemReserved are ['cpu','memory','ephemeral-storage','pid']
                      rule: self.all(x, x=='cpu' || x=='memory' || x=='ephemeral-storage'
                        || x=='pid')
                    - message: systemReserved value cannot be a negative resource
                        quantity
                      rule: self.all(x, !self[x].startsWith('-'))
                type: object
              login:
                description: Login defines the node login configuration.
                properties:
                  userPassword:
                    description: UserPassword defines username/password login.
                    properties:
                      password:
                        description: Password is the salted and encrypted node password.
                        minLength: 1
                        type: string
                      username:
                        description: Username defaults to root.
                        enum:
                        - root
                        type: string
                    required:
                    - password
                    type: object
                required:
                - userPassword
                type: object
              runtimeConfiguration:
                description: RuntimeConfiguration configures the container runtime
                  used on the node.
                properties:
                  type:
                    description: Type is the container runtime type.
                    enum:
                    - docker
                    - containerd
                    type: string
                type: object
              subnetSelectorTerms:
                description: SubnetSelectorTerms is a list of subnet selector terms.
                  The terms are ORed.
                items:
                  description: |-
                    SubnetSelectorTerm defines selection logic for a subnet used by Karpenter to launch nodes.
                    If multiple fields are used for selection, the requirements are ANDed.
                  properties:
                    id:
                      description: ID is the subnet id in ECS
                      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
                      type: string
                    name:
                      description: Name is the subnet id in ECS
                      minLength: 1
                      type: string
                  type: object
                maxItems: 30
                type: array
                x-kubernetes-validations:
                - message: subnetSelectorTerms cannot be empty
                  rule: self.size() != 0
                - message: expected at least one, got none, ['name', 'id']
                  rule: self.all(x, has(x.name) || has(x.id))
            required:
            - blockDeviceMappings
            - imsSelector
            - login
            - subnetSelectorTerms
            type: object
          status:
            description: status defines the observed state of CCENodeClass
            properties:
              conditions:
                description: Conditions contains signals for health and readiness
                items:
                  description: Condition aliases the upstream type and adds additional
                    helper methods
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              subnets:
                description: |-
                  Subnets contains the current subnet values that are available to the
                  cluster under the subnet selectors.
                items:
                  description: Subnet contains resolved Subnet selector values utilized
                    for node launch
                  properties:
                    id:
                      description: ID of the subnet
                      type: string
                    zone:
                      description: The associated availability zone
                      type: string
                  required:
                  - id
                  - zone
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
