{{- if .Values.credentials.create }}
{{- $regionKey := upper (replace "-" "_" .Values.credentials.region) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "karpenter-provider-huawei.credentialsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
type: Opaque
stringData:
  HUAWEICLOUD_SDK_AK: {{ .Values.credentials.accessKey | quote }}
  HUAWEICLOUD_SDK_SK: {{ .Values.credentials.secretKey | quote }}
  HUAWEICLOUD_SDK_REGION_ID: {{ .Values.credentials.region | quote }}
  HUAWEICLOUD_SDK_CCE_CLUSTER_ID: {{ coalesce .Values.credentials.clusterID .Values.credentials.ClusterID "" | quote }}
  HUAWEICLOUD_SDK_PROJECT_ID: {{ .Values.credentials.projectID | quote }}
  HUAWEICLOUD_SDK_DOMAIN_ID: {{ .Values.credentials.domainID | quote }}
  HUAWEICLOUD_SDK_IAM_ENDPOINT: {{ .Values.credentials.iamEndpoint | quote }}
  HUAWEICLOUD_SDK_IGNORE_SSL_VERIFICATION: {{ .Values.credentials.ignoreSSLVerification | quote }}
  {{- if and .Values.credentials.region .Values.credentials.ecsEndpoint }}
  {{ printf "HUAWEICLOUD_SDK_REGION_ECS_%s" $regionKey }}: {{ .Values.credentials.ecsEndpoint | quote }}
  {{- end }}
  {{- if and .Values.credentials.region .Values.credentials.vpcEndpoint }}
  {{ printf "HUAWEICLOUD_SDK_REGION_VPC_%s" $regionKey }}: {{ .Values.credentials.vpcEndpoint | quote }}
  {{- end }}
  {{- if and .Values.credentials.region .Values.credentials.cceEndpoint }}
  {{ printf "HUAWEICLOUD_SDK_REGION_CCE_%s" $regionKey }}: {{ .Values.credentials.cceEndpoint | quote }}
  {{- end }}
  {{- if and .Values.credentials.region .Values.credentials.bssEndpoint }}
  {{ printf "HUAWEICLOUD_SDK_REGION_BSS_%s" $regionKey }}: {{ .Values.credentials.bssEndpoint | quote }}
  {{- end }}
{{- end }}
