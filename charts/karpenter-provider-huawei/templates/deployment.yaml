{{- if and .Values.podIdentity.enabled (or .Values.credentials.accessKey .Values.credentials.secretKey) }}
{{- fail "credentials.accessKey and credentials.secretKey must be empty when podIdentity.enabled is true" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karpenter-provider-huawei.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
    {{- include "karpenter-provider-huawei.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "karpenter-provider-huawei.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- if eq .Values.clusterInfo.category "eni" }}
        {{- with .Values.yangtseEipInfo }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
      labels:
        {{- include "karpenter-provider-huawei.selectorLabels" . | nindent 8 }}
        {{- if .Values.podIdentity.enabled }}
        pod-identity.cce.io/injection: "on"
        {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: manager
        image: {{ include "karpenter-provider-huawei.controllerImage" . | quote }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /manager
        args:
        - --metrics-port={{ .Values.controller.metrics.port }}
        - --health-probe-port={{ .Values.controller.healthProbe.port }}
        ports:
        - containerPort: {{ .Values.controller.metrics.port }}
          name: http-metrics
        env:
        - name: LEADER_ELECTION_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        envFrom:
        - secretRef:
            name: {{ include "karpenter-provider-huawei.credentialsSecretName" . }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        startupProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.controller.healthProbe.port }}
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.controller.healthProbe.port }}
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{ .Values.controller.healthProbe.port }}
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      serviceAccountName: {{ include "karpenter-provider-huawei.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
