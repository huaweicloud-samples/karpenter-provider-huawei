---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.namePrefix }}manager-role
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  - persistentvolumeclaims
  - persistentvolumes
  - replicationcontrollers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - delete
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/eviction
  verbs:
  - create
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses/finalizers
  verbs:
  - update
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - karpenter.sh
  resources:
  - nodeclaims
  - nodeclaims/status
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - karpenter.sh
  resources:
  - nodeclaims/finalizers
  verbs:
  - create
  - delete
  - patch
  - update
- apiGroups:
  - karpenter.sh
  resources:
  - nodeoverlays
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - karpenter.sh
  resources:
  - nodeoverlays/status
  - nodepools
  - nodepools/status
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - karpenter.sh
  resources:
  - nodepools/finalizers
  verbs:
  - patch
  - update
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage.k8s.io
  resources:
  - csinodes
  - storageclasses
  - volumeattachments
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.namePrefix }}manager-rolebinding
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.namePrefix }}manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "karpenter-provider-huawei.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.namePrefix }}leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.namePrefix }}leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.namePrefix }}leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "karpenter-provider-huawei.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.namePrefix }}ccenodeclass-admin-role
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
rules:
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses
  verbs:
  - '*'
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.namePrefix }}ccenodeclass-editor-role
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
rules:
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.namePrefix }}ccenodeclass-viewer-role
  labels:
    {{- include "karpenter-provider-huawei.labels" . | nindent 4 }}
rules:
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - karpenter.k8s.huawei
  resources:
  - ccenodeclasses/status
  verbs:
  - get
